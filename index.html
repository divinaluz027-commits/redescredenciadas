<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDL - Redes Credenciadas</title>
    <link rel="icon" href="fav.png" type="image/x-icon">
    <!-- Carrega o PDF.js do CDN de forma assíncrona -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        /* Reset de margens e ocupação total da tela */
        html, body { 
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f172a; /* Fundo escuro premium */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Container de rolagem dos PDFs */
        #pdf-scroll-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* Rolagem suave em dispositivos iOS */
        }

        /* Container interno para limitar a largura máxima das páginas */
        .pdf-wrapper {
            width: 90%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        /* Cada página renderizada em Canvas */
        .pdf-page-canvas {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            background-color: #ffffff;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .pdf-page-canvas.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        /* Indicador de Carregamento (Spinner) */
        #loading-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: #94a3b8;
            font-size: 0.95rem;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Fallback de Download se falhar */
        #fallback-link {
            display: none;
            margin-top: 10px;
            color: #3b82f6;
            text-decoration: underline;
            cursor: pointer;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Ajustes finos para celulares */
        @media (max-width: 600px) {
            #pdf-scroll-container {
                padding: 12px 0;
            }
            .pdf-wrapper {
                width: 95%;
                gap: 16px;
            }
            .pdf-page-canvas {
                border-radius: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- Indicador visual de carregamento -->
    <div id="loading-indicator">
        <div class="spinner"></div>
        <p>Carregando documento...</p>
        <a id="fallback-link" href="gdl.pdf" target="_blank">Clique aqui se o PDF não carregar</a>
    </div>

    <!-- Área de rolagem das páginas do PDF -->
    <div id="pdf-scroll-container">
        <div class="pdf-wrapper" id="pdf-wrapper"></div>
    </div>

    <script>
        // Configura o worker do PDF.js usando a mesma versão da biblioteca principal
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        document.addEventListener('DOMContentLoaded', () => {
            // Permite carregar outro arquivo opcionalmente via URL (ex: ?file=outro.pdf)
            const urlParams = new URLSearchParams(window.location.search);
            const pdfUrl = urlParams.get('file') || 'gdl.pdf';
            
            const wrapper = document.getElementById('pdf-wrapper');
            const loader = document.getElementById('loading-indicator');
            const fallbackLink = document.getElementById('fallback-link');

            // Exibe o link alternativo caso demore mais de 3 segundos para carregar
            const fallbackTimeout = setTimeout(() => {
                fallbackLink.style.display = 'block';
            }, 3000);

            // Carrega o documento PDF
            pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
                clearTimeout(fallbackTimeout);
                
                // Oculta o loader
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 300);

                // Renderiza todas as páginas do PDF sequencialmente
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const canvas = document.createElement('canvas');
                    canvas.className = 'pdf-page-canvas';
                    wrapper.appendChild(canvas);

                    pdf.getPage(pageNum).then(page => {
                        const ctx = canvas.getContext('2d');
                        
                        // Renderiza em alta resolução (escala 2x) para telas Retina e boa qualidade
                        const unscaledViewport = page.getViewport({ scale: 1 });
                        const targetScale = 2.0; 
                        const viewport = page.getViewport({ scale: targetScale });

                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        const renderContext = {
                            canvasContext: ctx,
                            viewport: viewport
                        };

                        page.render(renderContext).promise.then(() => {
                            // Adiciona a classe 'loaded' para efeito suave de fade-in
                            canvas.classList.add('loaded');
                        });
                    });
                }
            }).catch(error => {
                console.error('Erro ao carregar o PDF:', error);
                loader.querySelector('p').textContent = 'Não foi possível carregar o PDF de forma integrada.';
                fallbackLink.style.display = 'block';
                fallbackLink.href = pdfUrl;
            });
        });
    </script>
</body>
</html>
